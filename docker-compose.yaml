services:
    db:
      image: postgres:15-alpine
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: "Ivbln173"
        POSTGRES_DB: user_db
      healthcheck:  
        test: ["CMD-SHELL","pg_isready -U postgres -d user_db"]
        interval: 10s
        timeout: 5s
        retries: 5
      ports:
        - "5432:5432"
      volumes:
        - pg_data:/var/lib/postgresql/data

    redis:
      image: redis:7-alpine
      restart: always
      ports:
        - "6379:6379"

    zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
    
    kafka:
      image: confluentinc/cp-kafka:7.5.0
      ports:
        - "9092:9092"
      environment:
        - KAFKA_BROKER_ID=2
        - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
        - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
        - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
        - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
        - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      depends_on:
        zookeeper:
          condition: service_started

    order_service:
      build:
        context: .
        dockerfile: ./cmd/order-service/Dockerfile
      ports:
        - "8081:8081"
      environment:
        - DB_DSN=postgres://postgres:Ivbln173@db:5432/user_db?sslmode=disable
        - KAFKA_ADDR=kafka:29092
        - JWT_KEY=${JWT_KEY}
      depends_on:
        db:
          condition: service_healthy
        kafka:
          condition: service_started 

    user_service:
      build:
        context: .
        dockerfile: ./cmd/user-service/Dockerfile
      restart: on-failure
      ports:
        - "8082:8082"
      environment:
        - DB_DSN=postgres://postgres:Ivbln173@db:5432/user_db?sslmode=disable
        - JWT_KEY=${JWT_KEY}
        - REDIS_ADDR=redis:6379
        - ADMIN_USERNAME=${ADMIN_USERNAME}
        - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_started

    notification_service:
      build:
        context: .
        dockerfile: ./cmd/notification-service/Dockerfile
      restart: on-failure
      environment:
        - KAFKA_ADDR=kafka:29092
        - BOT_TOKEN=${BOT_TOKEN}
        - CHAT_ID=${CHAT_ID}
      depends_on:
        kafka:
          condition: service_started

    api_gateway:
      build:
        context: .
        dockerfile: ./cmd/api-gateway/Dockerfile
      restart: on-failure
      ports:
        - "8080:8080"
      depends_on:
        - order_service
        - user_service
        - notification_service
    
volumes:
  pg_data:

